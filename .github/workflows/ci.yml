name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hard_enduro
          POSTGRES_PASSWORD: hard_enduro
          POSTGRES_DB: hard_enduro_world
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hard_enduro -d hard_enduro_world"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hard_enduro:hard_enduro@localhost:5432/hard_enduro_world?schema=public
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm with Corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.5.3 --activate
          pnpm --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm exec prisma validate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm run build
